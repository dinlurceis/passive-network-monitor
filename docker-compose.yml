services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pnads
      POSTGRES_USER: pnads
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pnads"]
      interval: 5s
      timeout: 3s
      retries: 10

  pnads:
    build: .
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: pnads
      DB_USER: pnads
      DB_PASSWORD: secret
      LOG_LEVEL: info
      OUI_FILE: /app/data/oui.csv
      API_PORT: "8080"
      PCAP_FILE: ""
      INTERFACE: "eth0"
    volumes:
      - ./samples:/samples:ro
      - ./data:/app/data:ro
    network_mode: host
    cap_add: [NET_RAW, NET_ADMIN]
    ports:
      - "8080:8080"

volumes:
  pgdata:
